<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Burguar Dreams</title>
<script>
(function () {
  var parts = location.pathname.split('/').filter(Boolean);
  var siteRoot = '/';
  /* GitHub Pages (proyecto): /NombreRepo/ — en Netlify/dominio propio la raíz es / */
  if (location.hostname.endsWith('github.io') && parts.length && parts[0] !== 'apartamento') {
    siteRoot = '/' + parts[0] + '/';
  }
  var slug = null;
  var aptIdx = parts.indexOf('apartamento');
  if (aptIdx >= 0 && parts[aptIdx + 1]) slug = parts[aptIdx + 1];
  var target = location.origin + siteRoot;
  var q = new URLSearchParams(location.search);
  if (slug) q.set('inmueble', slug);
  var qs = q.toString();
  location.replace(target + (qs ? '?' + qs : ''));
})();
</script>
</head>
<body></body>
</html>
